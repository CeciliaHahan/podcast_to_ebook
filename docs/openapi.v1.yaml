openapi: 3.1.0
info:
  title: Podcasts_to_ebooks API
  version: 1.1.0
  description: Staged transcript-to-EPUB API contract (4-step pipeline for dev tooling).
servers:
  - url: http://localhost:8080
    description: Local dev
security:
  - bearerAuth: []
tags:
  - name: Staged Pipeline
paths:
  /v1/working-notes/from-transcript:
    post:
      tags: [Staged Pipeline]
      summary: Generate working notes from transcript text
      operationId: createWorkingNotesFromTranscript
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TranscriptRequest"
      responses:
        "200":
          description: Working notes generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StagedResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
  /v1/booklet-outline/from-working-notes:
    post:
      tags: [Staged Pipeline]
      summary: Generate booklet outline from working notes
      operationId: createBookletOutlineFromWorkingNotes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OutlineRequest"
      responses:
        "200":
          description: Booklet outline generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StagedResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
  /v1/booklet-draft/from-booklet-outline:
    post:
      tags: [Staged Pipeline]
      summary: Generate booklet draft from outline
      operationId: createBookletDraftFromOutline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DraftRequest"
      responses:
        "200":
          description: Booklet draft generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StagedResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
  /v1/epub/from-booklet-draft:
    post:
      tags: [Staged Pipeline]
      summary: Build EPUB from booklet draft (deterministic, no LLM)
      operationId: createEpubFromBookletDraft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EpubFromDraftRequest"
      responses:
        "200":
          description: EPUB built with download URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StagedResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: "Bearer dev-token or Bearer dev:<email>"
  responses:
    ErrorResponse:
      description: Standard API error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    TranscriptRequest:
      type: object
      required: [title, language, transcript_text]
      properties:
        title:
          type: string
        language:
          type: string
          example: zh-CN
        transcript_text:
          type: string
          maxLength: 80000
        metadata:
          type: object
    OutlineRequest:
      type: object
      required: [title, language, working_notes]
      properties:
        title:
          type: string
        language:
          type: string
        working_notes:
          type: object
        metadata:
          type: object
    DraftRequest:
      type: object
      required: [title, language, working_notes, booklet_outline]
      properties:
        title:
          type: string
        language:
          type: string
        working_notes:
          type: object
        booklet_outline:
          type: object
        metadata:
          type: object
    EpubFromDraftRequest:
      type: object
      required: [title, language, booklet_draft]
      properties:
        title:
          type: string
        language:
          type: string
        booklet_draft:
          type: object
        metadata:
          type: object
    StagedResponse:
      type: object
      required: [job_id, status, created_at, stages, traceability]
      properties:
        job_id:
          type: string
        status:
          type: string
          enum: [succeeded]
        created_at:
          type: string
          format: date-time
        stages:
          type: array
          items:
            $ref: "#/components/schemas/InspectorStageRecord"
        traceability:
          type: object
    InspectorStageRecord:
      type: object
      required: [stage, ts]
      properties:
        stage:
          type: string
        ts:
          type: string
          format: date-time
        input:
          type: object
        output:
          type: object
        config:
          type: object
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, request_id]
          properties:
            code:
              type: string
            message:
              type: string
            request_id:
              type: string
