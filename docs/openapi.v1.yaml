openapi: 3.1.0
info:
  title: Podcasts_to_ebooks API
  version: 1.0.0
  description: Current transcript-to-EPUB API contract (single inline generation path).
servers:
  - url: https://api.example.com
    description: Production
  - url: https://staging-api.example.com
    description: Staging
security:
  - bearerAuth: []
tags:
  - name: Generation
paths:
  /v1/epub/from-transcript:
    post:
      tags: [Generation]
      summary: Generate EPUB from transcript text (inline)
      operationId: createEpubFromTranscript
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEpubFromTranscriptRequest"
      responses:
        "200":
          description: EPUB generated inline with artifacts and inspector stages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEpubFromTranscriptResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "429":
          $ref: "#/components/responses/ErrorResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    ErrorResponse:
      description: Standard API error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    OutputFormat:
      type: string
      enum: [epub, pdf, md]
    CommonMetadata:
      type: object
      additionalProperties: true
      properties:
        podcast_name:
          type: string
        speaker:
          type: string
        episode_url:
          type: string
          format: uri
        generation_method:
          type: string
          enum: [A, B, C]
    CreateEpubFromTranscriptRequest:
      type: object
      additionalProperties: false
      required:
        - title
        - language
        - transcript_text
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 300
        language:
          type: string
          example: zh-CN
        transcript_text:
          type: string
          minLength: 10
          maxLength: 120000
        template_id:
          type: string
          default: templateA-v0-book
        metadata:
          $ref: "#/components/schemas/CommonMetadata"
    JobArtifactItem:
      type: object
      required: [type, file_name, size_bytes, download_url, expires_at]
      properties:
        type:
          $ref: "#/components/schemas/OutputFormat"
        file_name:
          type: string
        size_bytes:
          type: integer
          minimum: 0
        download_url:
          type: string
          format: uri
        expires_at:
          type: string
          format: date-time
    InspectorStageRecord:
      type: object
      required: [stage, ts]
      properties:
        stage:
          type: string
          example: normalization
        ts:
          type: string
          format: date-time
        input:
          type: object
          additionalProperties: true
        output:
          type: object
          additionalProperties: true
        config:
          type: object
          additionalProperties: true
        notes:
          type: string
    CreateEpubFromTranscriptResponse:
      type: object
      required: [job_id, status, created_at, artifacts, stages, traceability]
      properties:
        job_id:
          type: string
          example: run_abc123
        status:
          type: string
          enum: [succeeded]
        created_at:
          type: string
          format: date-time
        artifacts:
          type: array
          items:
            $ref: "#/components/schemas/JobArtifactItem"
        stages:
          type: array
          items:
            $ref: "#/components/schemas/InspectorStageRecord"
        traceability:
          type: object
          required: [source_type, source_ref, generated_at]
          properties:
            source_type:
              type: string
              enum: [transcript]
            source_ref:
              type: string
            generated_at:
              type: string
              format: date-time
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, request_id]
          properties:
            code:
              type: string
            message:
              type: string
            request_id:
              type: string
